<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your savings goals - FinanceFlow">
  <title>Savings Goals | FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" onclick="toggleSidebar()"><svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
          <div><h1>Savings Goals</h1><p>Track progress towards your financial goals</p></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openGoalModal()" style="width:auto;">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          New Goal
        </button>
      </div>

      <div class="page-body">
        <!-- Tabs -->
        <div style="margin-bottom:20px;">
          <div class="tabs" style="display:inline-flex;width:auto;">
            <button class="tab-btn active" onclick="filterGoals('active',this)">Active</button>
            <button class="tab-btn" onclick="filterGoals('completed',this)">Completed</button>
            <button class="tab-btn" onclick="filterGoals('all',this)">All</button>
          </div>
        </div>

        <!-- Goals Grid -->
        <div class="bento-grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr));" id="goals-grid">
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-state-icon"><svg style="width:28px;height:28px;color:var(--text-faint);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg></div>
            <p class="empty-state-title">No savings goals</p>
            <p class="empty-state-text">Start saving towards something special</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Goal Modal -->
  <div class="modal-overlay" id="goal-modal">
    <div class="modal" style="max-width:460px;">
      <div class="modal-header">
        <h3 class="modal-title" id="goal-modal-title">New Savings Goal</h3>
        <button class="modal-close" onclick="closeGoalModal()"><svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body">
        <form id="goal-form">
          <input type="hidden" id="goal-edit-id" value="">
          <div class="form-group">
            <label class="form-label">Goal Name</label>
            <input type="text" id="goal-name" class="form-input" placeholder="e.g. New Laptop, Vacation" required>
          </div>
          <div class="form-group">
            <label class="form-label">Target Amount (LKR)</label>
            <input type="number" id="goal-target" class="form-input" placeholder="0.00" step="0.01" min="1" required style="font-size:18px;font-weight:700;">
          </div>
          <div class="form-group">
            <label class="form-label">Current Saved (LKR)</label>
            <input type="number" id="goal-current" class="form-input" placeholder="0.00" step="0.01" min="0" value="0">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">Icon</label>
              <input type="text" id="goal-icon" class="form-input" placeholder="🎯" value="🎯" maxlength="4" style="text-align:center;font-size:20px;">
            </div>
            <div class="form-group">
              <label class="form-label">Deadline</label>
              <input type="date" id="goal-deadline" class="form-input">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeGoalModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveGoal()" style="width:auto;">Save Goal</button>
      </div>
    </div>
  </div>

  <!-- Add Money Modal -->
  <div class="modal-overlay" id="add-money-modal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <h3 class="modal-title">Add to Savings</h3>
        <button class="modal-close" onclick="closeAddMoney()"><svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="add-money-goal-id">
        <div class="form-group">
          <label class="form-label">Amount to add (LKR)</label>
          <input type="number" id="add-money-amount" class="form-input" placeholder="0.00" step="0.01" min="0.01" required style="font-size:18px;font-weight:700;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAddMoney()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmAddMoney()" style="width:auto;">Add Money</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="goal-delete-modal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header"><h3 class="modal-title">Delete Goal</h3></div>
      <div class="modal-body"><p style="font-size:14px;color:var(--text-secondary);">Are you sure you want to delete this savings goal?</p><input type="hidden" id="goal-delete-id"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeGoalDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmGoalDelete()" style="width:auto;">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script src="/js/components-loader.js"></script>
  <script>
    ComponentLoader.load('/components/sidebar.html', '#sidebar-container');

    let currentUser = null;
    let goals = [];
    let currentFilter = 'active';

    async function init() {
      const session = await redirectIfNotLoggedIn();
      if (!session) return;
      currentUser = session.user;
      await loadGoals();
    }

    async function loadGoals() {
      let query = supabaseClient.from('savings_goals').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      const { data } = await query;
      goals = data || [];
      renderGoals();
    }

    function filterGoals(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGoals();
    }

    function renderGoals() {
      let filtered = goals;
      if (currentFilter !== 'all') filtered = goals.filter(g => g.status === currentFilter);

      if (!filtered.length) {
        document.getElementById('goals-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon"><svg style="width:28px;height:28px;color:var(--text-faint);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg></div><p class="empty-state-title">No ${currentFilter} goals</p><p class="empty-state-text">Create a new savings goal to get started</p></div>`;
        return;
      }

      document.getElementById('goals-grid').innerHTML = filtered.map(g => {
        const pct = Math.min(100, Math.round((Number(g.current_amount) / Number(g.target_amount)) * 100));
        const cls = pct >= 100 ? 'success' : pct >= 70 ? 'warning' : '';
        const isComplete = g.status === 'completed';
        const deadlineStr = g.deadline ? new Date(g.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : null;

        return `<div class="bento-card" style="grid-column:span 1;${isComplete ? 'opacity:0.75;' : ''}">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:48px;height:48px;border-radius:14px;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:22px;">${g.icon || '🎯'}</div>
              <div>
                <div style="font-size:16px;font-weight:700;">${g.name}</div>
                ${deadlineStr ? `<div style="font-size:12px;color:var(--text-muted);">Due: ${deadlineStr}</div>` : ''}
              </div>
            </div>
            <div style="display:flex;gap:2px;">
              ${!isComplete ? `<button class="btn btn-ghost btn-icon btn-sm" onclick="openAddMoney('${g.id}')" title="Add money" style="color:var(--success);"><svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg></button>` : ''}
              <button class="btn btn-ghost btn-icon btn-sm" onclick="editGoal('${g.id}')" title="Edit"><svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="openGoalDelete('${g.id}')" title="Delete" style="color:var(--danger);"><svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
            <span style="font-size:22px;font-weight:700;">${fmtCur(g.current_amount)}</span>
            <span style="font-size:13px;font-weight:600;color:var(--text-muted);">${pct}%</span>
          </div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">of ${fmtCur(g.target_amount)} target</div>
          <div class="progress-bar-track" style="height:10px;">
            <div class="progress-bar-fill ${cls}" style="width:${pct}%;"></div>
          </div>
          ${pct >= 100 ? '<div style="margin-top:10px;font-size:13px;font-weight:600;color:var(--success);">🎉 Goal reached!</div>' :
            `<div style="margin-top:10px;font-size:12px;color:var(--text-muted);">${fmtCur(Number(g.target_amount) - Number(g.current_amount))} remaining</div>`}
        </div>`;
      }).join('');
    }

    function openGoalModal(data = null) {
      document.getElementById('goal-modal').classList.add('active');
      document.getElementById('goal-form').reset();
      document.getElementById('goal-edit-id').value = '';
      document.getElementById('goal-icon').value = '🎯';
      document.getElementById('goal-current').value = '0';
      document.getElementById('goal-modal-title').textContent = 'New Savings Goal';
      if (data) {
        document.getElementById('goal-modal-title').textContent = 'Edit Goal';
        document.getElementById('goal-edit-id').value = data.id;
        document.getElementById('goal-name').value = data.name;
        document.getElementById('goal-target').value = data.target_amount;
        document.getElementById('goal-current').value = data.current_amount;
        document.getElementById('goal-icon').value = data.icon || '🎯';
        document.getElementById('goal-deadline').value = data.deadline || '';
      }
    }
    function closeGoalModal() { document.getElementById('goal-modal').classList.remove('active'); }

    function editGoal(id) { const g = goals.find(x => x.id === id); if (g) openGoalModal(g); }

    async function saveGoal() {
      const editId = document.getElementById('goal-edit-id').value;
      const name = document.getElementById('goal-name').value.trim();
      const target = parseFloat(document.getElementById('goal-target').value);
      const current = parseFloat(document.getElementById('goal-current').value) || 0;
      const icon = document.getElementById('goal-icon').value || '🎯';
      const deadline = document.getElementById('goal-deadline').value || null;

      if (!name) return Toast.show('Enter a goal name', 'warning');
      if (!target || target <= 0) return Toast.show('Enter a valid target', 'warning');

      const status = current >= target ? 'completed' : 'active';

      try {
        const payload = { name, target_amount: target, current_amount: current, icon, deadline, status };
        if (editId) {
          const { error } = await supabaseClient.from('savings_goals').update(payload).eq('id', editId);
          if (error) throw error;
          Toast.show('Goal updated!', 'success');
        } else {
          payload.user_id = currentUser.id;
          const { error } = await supabaseClient.from('savings_goals').insert(payload);
          if (error) throw error;
          Toast.show('Goal created!', 'success');
        }
        closeGoalModal();
        await loadGoals();
      } catch (e) { Toast.show(e.message || 'Failed', 'error'); }
    }

    function openAddMoney(id) {
      document.getElementById('add-money-goal-id').value = id;
      document.getElementById('add-money-amount').value = '';
      document.getElementById('add-money-modal').classList.add('active');
    }
    function closeAddMoney() { document.getElementById('add-money-modal').classList.remove('active'); }

    async function confirmAddMoney() {
      const id = document.getElementById('add-money-goal-id').value;
      const amount = parseFloat(document.getElementById('add-money-amount').value);
      if (!amount || amount <= 0) return Toast.show('Enter a valid amount', 'warning');

      const goal = goals.find(g => g.id === id);
      if (!goal) return;

      const newAmount = Number(goal.current_amount) + amount;
      const status = newAmount >= Number(goal.target_amount) ? 'completed' : 'active';

      try {
        const { error } = await supabaseClient.from('savings_goals').update({
          current_amount: newAmount, status
        }).eq('id', id);
        if (error) throw error;

        if (status === 'completed') {
          Toast.show('🎉 Goal achieved! Congratulations!', 'success', 5000);
        } else {
          Toast.show(`Added ${fmtCur(amount)} to savings!`, 'success');
        }
        closeAddMoney();
        await loadGoals();
      } catch (e) { Toast.show(e.message, 'error'); }
    }

    function openGoalDelete(id) {
      document.getElementById('goal-delete-id').value = id;
      document.getElementById('goal-delete-modal').classList.add('active');
    }
    function closeGoalDeleteModal() { document.getElementById('goal-delete-modal').classList.remove('active'); }

    async function confirmGoalDelete() {
      const id = document.getElementById('goal-delete-id').value;
      try {
        const { error } = await supabaseClient.from('savings_goals').delete().eq('id', id);
        if (error) throw error;
        Toast.show('Goal deleted', 'success');
        closeGoalDeleteModal();
        await loadGoals();
      } catch (e) { Toast.show(e.message, 'error'); }
    }

    function fmtCur(v) { return `LKR ${Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`; }

    document.querySelectorAll('.modal-overlay').forEach(m => { m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); }); });
    init();
  </script>
</body>
</html>
