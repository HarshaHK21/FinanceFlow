<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your income and expenses - FinanceFlow">
  <title>Transactions | FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" onclick="toggleSidebar()">
            <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h1>Transactions</h1>
            <p>Track and manage your income & expenses</p>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openTxnModal()" style="width:auto;">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add Transaction
        </button>
      </div>

      <div class="page-body">
        <!-- Filters -->
        <div class="filter-bar" style="margin-bottom:20px;">
          <div class="search-input-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" class="form-input" id="search-input" placeholder="Search transactions..." oninput="filterTransactions()">
          </div>
          <select class="form-input" id="filter-type" onchange="filterTransactions()">
            <option value="all">All Types</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <select class="form-input" id="filter-category" onchange="filterTransactions()">
            <option value="all">All Categories</option>
          </select>
          <input type="month" class="form-input" id="filter-month" onchange="filterTransactions()" style="min-width:140px;">
        </div>

        <!-- Transactions Table -->
        <div class="bento-card span-12" style="padding:0;overflow:hidden;">
          <div style="overflow-x:auto;">
            <table class="data-table" id="txn-table">
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Description</th>
                  <th>Date</th>
                  <th>Type</th>
                  <th style="text-align:right;">Amount</th>
                  <th style="text-align:center;width:80px;">Actions</th>
                </tr>
              </thead>
              <tbody id="txn-tbody">
                <tr>
                  <td colspan="6">
                    <div class="empty-state">
                      <div class="empty-state-icon"><svg style="width:28px;height:28px;color:var(--text-faint);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg></div>
                      <p class="empty-state-title">No transactions found</p>
                      <p class="empty-state-text">Add your first transaction to start tracking</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openTxnModal()" title="Add Transaction">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
  </button>

  <!-- Add/Edit Transaction Modal -->
  <div class="modal-overlay" id="txn-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="txn-modal-title">Add Transaction</h3>
        <button class="modal-close" onclick="closeTxnModal()">
          <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="txn-form">
          <input type="hidden" id="txn-edit-id" value="">
          <div class="form-group">
            <div class="tabs" id="modal-type-tabs">
              <button type="button" class="tab-btn active" data-type="expense" onclick="selectType('expense')">Expense</button>
              <button type="button" class="tab-btn" data-type="income" onclick="selectType('income')">Income</button>
            </div>
          </div>
          <input type="hidden" id="txn-type" value="expense">
          <div class="form-group">
            <label class="form-label">Amount (LKR)</label>
            <input type="number" id="txn-amount" class="form-input" placeholder="0.00" step="0.01" min="0.01" required style="font-size:20px;font-weight:700;">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="txn-category" class="form-input" required><option value="">Select...</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" id="txn-description" class="form-input" placeholder="What was this for?">
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="txn-date" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Notes <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <textarea id="txn-notes" class="form-input" placeholder="Additional notes..." rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeTxnModal()">Cancel</button>
        <button type="button" class="btn btn-primary" id="modal-save-btn" onclick="saveTxn()" style="width:auto;">
          <span id="modal-save-text">Save</span>
          <div class="spinner hidden" id="modal-save-spinner"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header"><h3 class="modal-title">Delete Transaction</h3></div>
      <div class="modal-body">
        <p style="font-size:14px;color:var(--text-secondary);">Are you sure you want to delete this transaction? This action cannot be undone.</p>
        <input type="hidden" id="delete-txn-id">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()" style="width:auto;">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script src="/js/components-loader.js"></script>
  <script>
    ComponentLoader.load('/components/sidebar.html', '#sidebar-container');

    let allTransactions = [];
    let allCategories = [];
    let currentUser = null;

    async function init() {
      const session = await redirectIfNotLoggedIn();
      if (!session) return;
      currentUser = session.user;

      // Set default month filter
      const now = new Date();
      document.getElementById('filter-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      document.getElementById('txn-date').valueAsDate = now;

      await loadCategories();
      await loadTransactions();
    }

    async function loadCategories() {
      const { data } = await supabaseClient
        .from('categories')
        .select('*')
        .or(`is_system.eq.true,user_id.eq.${currentUser.id}`)
        .order('name');
      allCategories = data || [];

      // Populate filter select
      const filterCat = document.getElementById('filter-category');
      filterCat.innerHTML = '<option value="all">All Categories</option>';
      allCategories.forEach(c => {
        filterCat.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`;
      });

      populateModalCategories('expense');
    }

    function populateModalCategories(type) {
      const sel = document.getElementById('txn-category');
      sel.innerHTML = '<option value="">Select...</option>';
      allCategories.filter(c => c.type === type).forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`;
      });
    }

    async function loadTransactions() {
      const monthVal = document.getElementById('filter-month').value;
      let query = supabaseClient
        .from('transactions')
        .select('*, categories(name, icon, color)')
        .eq('user_id', currentUser.id)
        .order('transaction_date', { ascending: false });

      if (monthVal) {
        const [y, m] = monthVal.split('-');
        const startDate = `${y}-${m}-01`;
        const endDate = new Date(Number(y), Number(m), 0).toISOString().split('T')[0];
        query = query.gte('transaction_date', startDate).lte('transaction_date', endDate);
      }

      const { data } = await query;
      allTransactions = data || [];
      filterTransactions();
    }

    function filterTransactions() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const typeFilter = document.getElementById('filter-type').value;
      const catFilter = document.getElementById('filter-category').value;

      let filtered = allTransactions;

      if (search) {
        filtered = filtered.filter(t =>
          (t.description || '').toLowerCase().includes(search) ||
          (t.categories?.name || '').toLowerCase().includes(search) ||
          String(t.amount).includes(search)
        );
      }
      if (typeFilter !== 'all') filtered = filtered.filter(t => t.type === typeFilter);
      if (catFilter !== 'all') filtered = filtered.filter(t => t.category_id === catFilter);

      renderTable(filtered);
    }

    function renderTable(txns) {
      const tbody = document.getElementById('txn-tbody');
      if (!txns.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon"><svg style="width:28px;height:28px;color:var(--text-faint);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div><p class="empty-state-title">No transactions found</p><p class="empty-state-text">Try adjusting your filters</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = txns.map(t => {
        const cat = t.categories || {};
        return `<tr>
          <td>
            <div class="txn-category">
              <div class="txn-icon" style="background:${cat.color}12;">${cat.icon || '📁'}</div>
              <span style="font-weight:500;">${cat.name || 'Unknown'}</span>
            </div>
          </td>
          <td style="color:var(--text-secondary);">${t.description || '—'}</td>
          <td style="color:var(--text-muted);font-size:13px;">${formatDate(t.transaction_date)}</td>
          <td><span class="badge ${t.type}">${t.type === 'income' ? '↑ Income' : '↓ Expense'}</span></td>
          <td style="text-align:right;" class="txn-amount ${t.type}">${t.type === 'income' ? '+' : '-'} ${formatCurrency(t.amount)}</td>
          <td style="text-align:center;">
            <div style="display:flex;gap:4px;justify-content:center;">
              <button class="btn btn-ghost btn-icon btn-sm" onclick="editTxn('${t.id}')" title="Edit">
                <svg style="width:15px;height:15px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="deleteTxn('${t.id}')" title="Delete" style="color:var(--danger);">
                <svg style="width:15px;height:15px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    // Type tabs
    function selectType(type) {
      document.getElementById('txn-type').value = type;
      document.querySelectorAll('#modal-type-tabs .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
      populateModalCategories(type);
    }

    // Open modal
    function openTxnModal(editData = null) {
      document.getElementById('txn-modal').classList.add('active');
      document.getElementById('txn-form').reset();
      document.getElementById('txn-edit-id').value = '';
      document.getElementById('txn-date').valueAsDate = new Date();
      document.getElementById('txn-modal-title').textContent = 'Add Transaction';
      selectType('expense');

      if (editData) {
        document.getElementById('txn-modal-title').textContent = 'Edit Transaction';
        document.getElementById('txn-edit-id').value = editData.id;
        document.getElementById('txn-amount').value = editData.amount;
        document.getElementById('txn-description').value = editData.description || '';
        document.getElementById('txn-date').value = editData.transaction_date;
        document.getElementById('txn-notes').value = editData.notes || '';
        selectType(editData.type);
        setTimeout(() => { document.getElementById('txn-category').value = editData.category_id; }, 50);
      }
    }

    function closeTxnModal() { document.getElementById('txn-modal').classList.remove('active'); }

    // Edit
    function editTxn(id) {
      const txn = allTransactions.find(t => t.id === id);
      if (txn) openTxnModal(txn);
    }

    // Save (create or update)
    async function saveTxn() {
      const editId = document.getElementById('txn-edit-id').value;
      const type = document.getElementById('txn-type').value;
      const amount = parseFloat(document.getElementById('txn-amount').value);
      const categoryId = document.getElementById('txn-category').value;
      const description = document.getElementById('txn-description').value.trim();
      const date = document.getElementById('txn-date').value;
      const notes = document.getElementById('txn-notes').value.trim();

      if (!amount || amount <= 0) return Toast.show('Enter a valid amount', 'warning');
      if (!categoryId) return Toast.show('Select a category', 'warning');
      if (!date) return Toast.show('Select a date', 'warning');

      const btn = document.getElementById('modal-save-btn');
      btn.disabled = true;
      document.getElementById('modal-save-text').textContent = 'Saving...';
      document.getElementById('modal-save-spinner').classList.remove('hidden');

      try {
        const payload = { type, amount, category_id: categoryId, description: description || null, notes: notes || null, transaction_date: date };

        if (editId) {
          const { error } = await supabaseClient.from('transactions').update(payload).eq('id', editId).eq('user_id', currentUser.id);
          if (error) throw error;
          Toast.show('Transaction updated!', 'success');
        } else {
          payload.user_id = currentUser.id;
          const { error } = await supabaseClient.from('transactions').insert(payload);
          if (error) throw error;
          Toast.show('Transaction added!', 'success');
        }

        closeTxnModal();
        await loadTransactions();
      } catch (e) {
        Toast.show(e.message || 'Failed to save', 'error');
      } finally {
        btn.disabled = false;
        document.getElementById('modal-save-text').textContent = 'Save';
        document.getElementById('modal-save-spinner').classList.add('hidden');
      }
    }

    // Delete
    function deleteTxn(id) {
      document.getElementById('delete-txn-id').value = id;
      document.getElementById('delete-modal').classList.add('active');
    }
    function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('active'); }

    async function confirmDelete() {
      const id = document.getElementById('delete-txn-id').value;
      try {
        const { error } = await supabaseClient.from('transactions').delete().eq('id', id).eq('user_id', currentUser.id);
        if (error) throw error;
        Toast.show('Transaction deleted', 'success');
        closeDeleteModal();
        await loadTransactions();
      } catch (e) {
        Toast.show(e.message || 'Failed to delete', 'error');
      }
    }

    // Helpers
    function formatCurrency(v) { return `LKR ${Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`; }
    function formatDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); });
    });

    // Reload when month changes
    document.getElementById('filter-month').addEventListener('change', loadTransactions);

    init();
  </script>
</body>
</html>
