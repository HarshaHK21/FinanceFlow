  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebar-user-section">
      <div class="sidebar-avatar" id="sidebar-avatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
        <div class="sidebar-user-email" id="sidebar-user-email">...</div>
      </div>
    </div>
    <button onclick="handleSignOut()" class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px;font-size:12px;color:var(--text-muted);" aria-label="Sign Out">

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<script>
  // Active link highlight
  (function() {
    const path = window.location.pathname;
    document.querySelectorAll('.sidebar-link').forEach(link => {
      if (path.includes(link.dataset.page)) link.classList.add('active');
    });
  })();

  // Sidebar user info
  async function updateSidebarUser() {
    try {
      const session = await getSession();
      if (session && session.user) {
        const user = session.user;
        const name = user.user_metadata?.full_name || 'User';
        document.getElementById('sidebar-user-name').textContent = name;
        document.getElementById('sidebar-user-email').textContent = user.email || '';
        document.getElementById('sidebar-avatar').textContent = name.charAt(0).toUpperCase();
      }
    } catch(e) { console.error('Sidebar user:', e); }
  }
  updateSidebarUser();

  async function handleSignOut() {
    try {
      await signOutUser();
      window.location.href = '/pages/login.html';
    } catch(e) { Toast.show('Sign out failed', 'error'); }
  }

  function toggleSidebar() {
    document.getElementById('app-sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
</script>
